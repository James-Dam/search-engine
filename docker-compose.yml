services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      SEARCH_INDEX_PATH: /app/index_output
    ports:
      - "8000:8000"
    volumes:
      - ./index_output:/app/index_output:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://127.0.0.1:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
